name: Weekly Topic Research

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate weekly topics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 research.py

      - name: Commit updated topics
        run: |
          git config user.name  "LENZI Research Bot"
          git config user.email "research@lenzi.africa"
          git add topics.json
          git diff --staged --quiet || git commit -m "research: weekly topics $(date +%Y-W%V)"
          git push
