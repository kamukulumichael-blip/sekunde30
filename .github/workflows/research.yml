name: Weekly Topic Research

on:
  schedule:
    # Every Monday at 03:00 UTC = 06:00 EAT (East Africa Time, UTC+3)
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh even if topics are recent'
        required: false
        default: 'false'

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate weekly topics with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, sys
          import urllib.request, urllib.error
          from datetime import datetime, timezone

          api_key = os.environ.get('ANTHROPIC_API_KEY', '')
          if not api_key:
              print("ERROR: ANTHROPIC_API_KEY secret not set", file=sys.stderr)
              sys.exit(1)

          now = datetime.now(timezone.utc)
          today = now.strftime('%B %d, %Y')
          week  = now.strftime('%Y-W%V')

          prompt = f"""You are the intelligence analyst for Michael Kamukulu's personal content brand LENZI.

Today is {today}. You are generating the weekly content research brief for Sekunde 30 — Michael's 30-second short video series publishing 4 videos/week across LinkedIn, Instagram, TikTok, YouTube Shorts, Facebook, and X.

═══════════════════════════════════════════════════
WHO IS MICHAEL KAMUKULU
═══════════════════════════════════════════════════
Executive Director of LearnImpact, Dar es Salaam, Tanzania. Personal brand: LENZI — "Learning · Technology · Systems." He speaks to Africa's professional class about systems thinking, AI in education, learning reform, and what it takes to build institutions that actually work. He has government access, published RCT evidence (Quarterly Journal of Economics), and ~500K followers across platforms (TikTok 211K, Facebook 161K, Instagram 104K). He has spent 10+ years inside Tanzania's education system.

POSITIONING: Influential Leader. Not a motivational coach. Not a development worker. An African systems thinker who speaks plainly about what it actually takes to change things.

CONTENT RULES (ABSOLUTE):
- Michael is always the first-person centre. Never institutional.
- LearnImpact, KiuFunza, SOMA must NOT appear in content.
- His audience: Africa's professional class — people who think about systems, AI, careers, and Africa's future.
- Every topic needs a "what only Michael can say" angle grounded in his Tanzania/Kenya fieldwork.
- Bridge formula: start with "I" (relatable personal moment) → land on "we" (systemic insight).

HIS 6 CONTENT PILLARS:
1. AI & Humanity — AI's actual role in African education and work (vs the hype)
2. Africa — pan-African systems thinking, not poverty narrative
3. Education — evidence-based, reform-focused, ground-truth
4. Employability — Africa's youth, the skills gap, systems that serve or fail them
5. Leadership — institutional leaders, decision-making, accountability, systems change
6. TZ/KE Context — Tanzania and Kenya specific, Swahili-speaking professional class

HIS TRANSITION GAP (critical context):
Current TikTok content: Relationships (62 posts), Growth Mindset (52), Motivation (38). Only 6 AI & Technology posts. His existing audience knows the "old LENZI." Sekunde 30 must bridge them — topics must have a human/personal entry point that lands on a systems insight.

═══════════════════════════════════════════════════
RESEARCH BRIEF — WHAT TO THINK ABOUT
═══════════════════════════════════════════════════
Think carefully about what is actually happening in the world during the week of {today}. Reason through:

GLOBAL SIGNALS:
- What UNESCO, World Bank, IMF, OECD, or ILO have released recently on education, AI, employment, or development
- What is trending on LinkedIn among African professionals and global thought leaders this week
- What AI + education or AI + jobs news is generating significant conversation globally
- What counter-narrative or provocative intellectual positions are resonating in professional circles
- What tensions exist between global development frameworks and African reality right now

EAST AFRICA SPECIFIC:
- What is happening in Tanzania and Kenya in education policy, youth employment, or governance
- What local debates or challenges are live in the TZ/KE professional and public sector space
- What would resonate with Swahili-speaking professionals and feel distinctly rooted in their reality

MICHAEL'S BRAND LENS:
- Which topics give Michael a genuine "only I can say this" angle from his fieldwork?
- Which topics build a bridge from his existing mindset/motivation audience to systems/AI/education?
- Which topics have the viral potential of strong emotion + counter-intuitive insight?

═══════════════════════════════════════════════════
OUTPUT REQUIREMENTS
═══════════════════════════════════════════════════
Generate exactly 18 topics: 12 global (ids 1-12) + 6 TZ/KE specific (ids 13-18, tzke: true).

Scoring rubric:
- virality (1-10): emotional charge + counter-narrative strength + shareability + professional resonance
- brandFit (1-10): alignment with LENZI Influential Leader positioning (10 = perfect fit; low = motivational fluff or off-brand)
- bridge (1-10): how effectively this bridges Michael's existing personal-growth audience toward systems/AI/education content

Quality bar: every topic should be publishable immediately. No filler. No generic "AI is changing everything" topics without Michael's specific angle. The hook must be under 15 words and designed to stop a professional mid-scroll.

Return ONLY a raw JSON array — no markdown, no explanation, no code fences. Start with [ and end with ].

Schema:
[
  {{
    "id": 1,
    "title": "Title under 10 words — provocative, specific, not generic",
    "category": "AI & Humanity",
    "virality": 9,
    "brandFit": 9,
    "bridge": 8,
    "trendingBecause": "One clear sentence: why is this timely or trending right now",
    "michaelAngle": "First-person: the specific, credentialed thing Michael brings that no one else can",
    "hook": "Under 15 words, first-person, scroll-stopping opener for the 30-second video",
    "angle": "The distinctive or counter-narrative position Michael takes on this topic",
    "platforms": ["LinkedIn", "TikTok"],
    "sourceContext": "Source, publication, or context",
    "tzke": false
  }}
]

Topics 13-18 must have "tzke": true and be grounded in Tanzania and Kenya reality — specific places, data, or institutional context, not generic Africa content."""

          payload = json.dumps({
              "model": "claude-sonnet-4-6",
              "max_tokens": 8000,
              "messages": [{"role": "user", "content": prompt}]
          }).encode('utf-8')

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=payload,
              headers={
                  'x-api-key': api_key,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json'
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  data = json.loads(resp.read().decode('utf-8'))
          except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8')
              print(f"API error {e.code}: {body}", file=sys.stderr)
              sys.exit(1)
          except Exception as e:
              print(f"Request failed: {e}", file=sys.stderr)
              sys.exit(1)

          raw = data.get('content', [{}])[0].get('text', '')
          match = re.search(r'\[[\s\S]*\]', raw)
          if not match:
              print(f"No JSON array found in response:\n{raw[:500]}", file=sys.stderr)
              sys.exit(1)

          try:
              topics = json.loads(match.group(0))
          except json.JSONDecodeError as e:
              print(f"JSON parse error: {e}", file=sys.stderr)
              sys.exit(1)

          if not isinstance(topics, list) or len(topics) < 12:
              print(f"Expected 18 topics, got {len(topics)}", file=sys.stderr)
              sys.exit(1)

          output = {
              "generated": now.isoformat(),
              "week": week,
              "topics": topics
          }

          with open('topics.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          print(f"SUCCESS: Generated {len(topics)} topics for week {week}")
          input_tokens  = data.get('usage', {}).get('input_tokens', '?')
          output_tokens = data.get('usage', {}).get('output_tokens', '?')
          print(f"Tokens: {input_tokens} in / {output_tokens} out")
          PYEOF

      - name: Commit updated topics
        run: |
          git config user.name  "LENZI Research Bot"
          git config user.email "research@lenzi.africa"
          git add topics.json
          git diff --staged --quiet || git commit -m "research: weekly topics $(date +%Y-W%V)"
          git push
